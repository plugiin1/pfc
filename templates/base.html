<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Autenticação Seguro</title>
    <style>
        /* Estilo Global Moderno */
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        /* Container Principal Centrado */
        .container { 
            background: white; 
            max-width: 450px; 
            width: 90%; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.1); 
            text-align: center;
        }

        h2 { color: #1c1e21; margin-bottom: 10px; }
        p.subtitle { color: #606770; font-size: 15px; margin-bottom: 30px; }

        /* Estilo Amigável para Campos de Entrada */
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border: 1px solid #dddfe2; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
            transition: border-color 0.2s;
        }
        input:focus { 
            border-color: #1877f2; 
            outline: none; 
            box-shadow: 0 0 0 2px #e7f3ff;
        }

        /* Estilo do Botão Principal - Azul Confiável */
        button { 
            width: 100%; 
            padding: 14px; 
            background: #1877f2; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 18px; 
            font-weight: bold;
            transition: background 0.2s;
            margin-top: 15px;
        }
        button:hover { background: #166fe5; }

        /* Botão Secundário para 2FA - Verde */
        button.verify { background: #42b72a; }
        button.verify:hover { background: #36a420; }

        /* Botão de Logout - Vermelho de Aviso */
        button.logout { background: #f02849; }
        button.logout:hover { background: #e02444; }

        /* Alertas Claros de Feedback */
        .alert-container { margin-bottom: 25px; }
        .alert { 
            padding: 15px; 
            border-radius: 8px; 
            font-size: 15px; 
            font-weight: 500;
        }
        .alert-error { background: #ffebe9; color: #cc0000; border: 1px solid #ffd1cf; }
        .alert-success { background: #e7f3ff; color: #1877f2; border: 1px solid #d1eaff; }

        /* Links de Navegação */
        .nav-links { margin-top: 25px; border-top: 1px solid #dddfe2; padding-top: 20px; }
        a { color: #1877f2; text-decoration: none; font-size: 15px; font-weight: 500; }
        a:hover { text-decoration: underline; }

        /* Estilo para Chave de 2FA */
        .key-box {
            background-color: #f7f8fa;
            border: 1px solid #dddfe2;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 1.1em;
            color: #1c1e21;
            margin: 20px 0;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="alert-container">
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  {% if "sucesso" in message.lower() %}
                    <div class="alert alert-success">{{ message }}</div>
                  {% else %}
                    <div class="alert alert-error">{{ message }}</div>
                  {% endif %}
                {% endfor %}
              {% endif %}
            {% endwith %}
        </div>
        
        {% block content %}{% endblock %}
    </div>
</body>
</html>
